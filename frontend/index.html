<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>LangChain - Renderizador de Artigos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #050505;
            color: #eee;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: #fff;
        }

        .logo {
            width: 40px;
            height: 40px;
        }

        /* Editor de System Prompt */
        .prompt-editor {
            margin-bottom: 30px;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .prompt-editor label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #888;
        }

        .prompt-editor textarea {
            width: 100%;
            height: 250px;
            /* Aumentado conforme pedido */
            background: #1a1a1a;
            color: #ddd;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
        }

        /* Barra de rolagem estilizada para o campo de texto */
        .prompt-editor textarea::-webkit-scrollbar {
            width: 8px;
        }

        .prompt-editor textarea::-webkit-scrollbar-track {
            background: #111;
            border-radius: 4px;
        }

        .prompt-editor textarea::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
            border: 2px solid #111;
        }

        .prompt-editor textarea::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .prompt-editor textarea:focus {
            border-color: #444;
        }

        /* Área do Artigo */
        .chat {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.5;
            color: #fff;
            min-height: 200px;
            border: 1px solid #111;
            position: relative;
        }

        /* Loader "Pensando..." */
        .loader {
            display: none;
            align-items: center;
            gap: 10px;
            color: #888;
            font-size: 1rem;
            font-style: italic;
            margin-bottom: 20px;
        }

        .loader-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .chat h1 {
            text-align: left;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2rem;
            color: #fff;
        }

        .chat p {
            margin: 0 0 4px 0;
            font-size: 1.1rem;
            color: #ccc;
        }

        /* Input Area Fixa no fundo */
        .input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        .input-area button {
            padding: 0 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-area button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <img src="assets/langchain.png" alt="LangChain Logo" class="logo">
            <h1>Gerador de Artigos Profissional</h1>
        </div>

        <!-- Editor de System Prompt -->
        <div class="prompt-editor">
            <label for="system-prompt">System Prompt (Instruções do Agente):</label>
            <textarea id="system-prompt">Você é um redator especialista em produção de conteúdo para blog.
Gere um artigo em HTML válido seguindo exatamente estas regras:

- Retorne apenas HTML.
- Não inclua explicações fora do HTML.
- Use obrigatoriamente:
- Um único <h1> para o título.
- Exatamente 30 parágrafos.
- Cada frase deve estar dentro de:
<p>Frase aqui.</p><br>
- Cada parágrafo deve conter apenas uma frase curta.
- Não use markdown.
- Não use outras tags além de <h1>, <p> e <br>.
- Não quebre a estrutura.</textarea>
        </div>

        <div id="chat" class="chat">
            <!-- Loader -->
            <div id="loader" class="loader">
                <div class="loader-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                Pensando...
            </div>
            <!-- O conteúdo será renderizado aqui -->
        </div>

        <form class="input-area" id="chat-form">
            <input type="text" id="prompt" placeholder="Digite o tema do artigo..." />
            <button type="submit">Gerar Artigo</button>
        </form>

    </div>

    <script src="app.js"></script>
</body>

</html>
