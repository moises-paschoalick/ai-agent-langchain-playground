<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LangChain Agent Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <img src="assets/langchain.png" alt="LangChain Logo" class="logo">
        <h1>LangChain Agent Streaming</h1>
    </div>

    <div id="chat" class="chat"></div>

    <form class="input-area" id="chat-form">
        <input type="text" id="prompt" placeholder="Pergunte alguma coisa..." />
        <button type="submit">Enviar</button>
    </form>

</div>

<script src="app.js"></script>
</body>
</html>
